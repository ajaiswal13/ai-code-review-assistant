version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: ai-review-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ai_review_db
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_review_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: